<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1917">
<title>Liquidación Gastos · Jandia Playa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f9f8f6;--surface:#fff;--border:#e5e3df;--text:#1a1917;--t2:#6b6861;--t3:#a09d97;--accent:#2563eb;--ok:#16a34a;--err:#dc2626;--r:12px}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:var(--text)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px}
.login-title{font-size:22px;font-weight:700;margin-bottom:1rem}
.login-input{width:100%;font-size:16px;padding:14px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);outline:none;margin-bottom:1rem}
.login-btn{width:100%;font-size:16px;font-weight:600;padding:15px;border-radius:8px;border:none;background:var(--text);color:#fff;cursor:pointer}
.login-err{background:#fef2f2;color:var(--err);padding:10px 14px;border-radius:8px;margin-bottom:1rem;display:none}
.login-err.show{display:block}
.app-shell{display:none;flex-direction:column;min-height:100vh}
.app-shell.visible{display:flex}
.app-header{background:var(--text);color:#fff;padding:0 1rem;display:flex;align-items:center;height:56px}
.app-header .logo{flex:1}
.header-btns{display:flex;gap:6px}
.hbtn{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:13px;padding:7px 12px;border-radius:6px;cursor:pointer}
.app-body{flex:1;padding:1.25rem 1rem;max-width:700px;margin:0 auto;width:100%}
.btn{font-size:14px;font-weight:500;padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;min-height:44px}
.btn-p{background:var(--text);color:#fff;border-color:var(--text)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.st{font-size:12px;font-weight:600;text-transform:uppercase;color:var(--t2)}
.trips{display:grid;gap:10px}
.tc{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1rem;cursor:pointer}
.tn{font-size:16px;font-weight:600;margin-bottom:3px}
.tm{font-size:13px;color:var(--t2)}
.iform{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:1rem}
.fi{font-size:16px;padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);width:100%;outline:none;margin-bottom:10px}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.drawer-backdrop.open{display:flex}
.drawer{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:500px;margin:0 auto}
.drawer-input{width:100%;font-size:16px;padding:13px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);outline:none;margin-bottom:1rem}
.provider-info{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:1rem;font-size:13px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--t2);background:none;border:none;padding:0;margin-bottom:1rem;cursor:pointer}
.dt{font-size:20px;font-weight:700;margin-bottom:1rem}
.rcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1rem}
.tw{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--t2);text-align:left;padding:10px;background:var(--bg)}
td{padding:10px;border-top:1px solid var(--border);font-size:13px}
.uz{border:2px dashed var(--border);border-radius:var(--r);padding:2rem 1.25rem;text-align:center;cursor:pointer;margin-bottom:1rem}
.empty{text-align:center;padding:4rem 1rem;color:var(--t3)}
</style>
</head>
<body>

<div class="loading-screen" id="loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999">
  <p>Cargando...</p>
</div>

<div class="login-wrap" id="login" style="display:none">
  <div class="login-box">
    <h1 class="login-title">Gastos de Viaje</h1>
    <p style="color:var(--t2);margin-bottom:1.5rem">Jandia Playa S.A.</p>
    <div class="login-err" id="login-err">Usuario o contraseña incorrectos</div>
    <input class="login-input" id="l-user" type="text" placeholder="Usuario">
    <input class="login-input" id="l-pass" type="password" placeholder="Contraseña">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div class="app-shell" id="app-shell">
  <header class="app-header">
    <div class="logo">Gastos de Viaje</div>
    <div class="header-btns">
      <button class="hbtn" onclick="openSettings()">⚙</button>
      <button class="hbtn" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <div class="app-body">
    <div id="root"></div>
  </div>
</div>

<div class="drawer-backdrop" id="settings-backdrop" onclick="closeSettings()">
  <div class="drawer" onclick="event.stopPropagation()">
    <h2 style="margin-bottom:1rem">⚙ Ajustes de IA</h2>
    <select class="drawer-input" id="provider-select" onchange="updateProviderUI()">
      <option value="tesseract">Tesseract.js (100% gratis, local)</option>
      <option value="anthropic">Anthropic Claude (muy preciso)</option>
      <option value="google">Google Cloud Vision (1000/mes gratis)</option>
      <option value="openai">OpenAI GPT-4o-mini (barato)</option>
    </select>
    <div id="provider-info"></div>
    <div id="api-key-section" style="display:none">
      <input class="drawer-input" id="api-key-input" type="password" placeholder="">
      <p id="api-key-hint" style="font-size:12px;color:var(--t2);margin-bottom:1rem"></p>
    </div>
    <button class="btn btn-p" style="width:100%" onclick="saveSettings()">Guardar</button>
  </div>
</div>

<input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFileSelect(this)">

<script>

// ════════════════════════════════════════════════════════════════
//  CONFIGURATION & INIT
// ════════════════════════════════════════════════════════════════
const SUPABASE_URL='https://gphyysdzkjnwihaottop.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwaHl5c2R6a2lud2loYW90dG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTA4MDgsImV4cCI6MjA5MjE4NjgwOH0.9rZFAIHAhfIKPpeQwcm1jTpuJlXwaQ9uK9VFxkZ6f9Q';
const CREDENTIALS={anxo:'11223344'};

let db;
try{db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}catch(e){console.error(e)}

// ════════════════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════════════════
function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  if(CREDENTIALS[u]===p){
    sessionStorage.setItem('session','1');
    document.getElementById('login').style.display='none';
    document.getElementById('app-shell').classList.add('visible');
    loadData();
  }else{
    document.getElementById('login-err').classList.add('show');
  }
}
function doLogout(){
  sessionStorage.removeItem('session');
  location.reload();
}

// ════════════════════════════════════════════════════════════════
//  AI SETTINGS
// ════════════════════════════════════════════════════════════════
function getProvider(){return localStorage.getItem('ai_provider')||'tesseract'}
function getApiKey(){return localStorage.getItem('ai_key')||''}

const PROVIDER_INFO={
  tesseract:{name:'Tesseract.js',info:'<strong>✅ Ventajas:</strong> 100% gratis, corre en tu navegador, privacidad total.<br><strong>⚠️ Limitaciones:</strong> Menos preciso.',needsKey:false},
  anthropic:{name:'Anthropic Claude',info:'<strong>✅ Muy preciso</strong><br><strong>💰 Coste:</strong> $5 gratis + ~$0.003/factura',needsKey:true,keyPlaceholder:'sk-ant-api03-...',keyHint:'console.anthropic.com → API Keys'},
  google:{name:'Google Cloud Vision',info:'<strong>✅ 1000/mes GRATIS</strong><br><strong>💰 Coste:</strong> Luego $1.50/1000',needsKey:true,keyPlaceholder:'AIzaSy...',keyHint:'console.cloud.google.com → Credentials'},
  openai:{name:'OpenAI',info:'<strong>✅ Barato</strong><br><strong>💰 Coste:</strong> $5 gratis + ~$0.0015/factura',needsKey:true,keyPlaceholder:'sk-proj-...',keyHint:'platform.openai.com → API Keys'}
};

function openSettings(){
  document.getElementById('provider-select').value=getProvider();
  document.getElementById('api-key-input').value=getApiKey();
  updateProviderUI();
  document.getElementById('settings-backdrop').classList.add('open');
}
function closeSettings(){document.getElementById('settings-backdrop').classList.remove('open')}
function updateProviderUI(){
  const provider=document.getElementById('provider-select').value;
  const info=PROVIDER_INFO[provider];
  document.getElementById('provider-info').innerHTML='<div class="provider-info">'+info.info+'</div>';
  const keySection=document.getElementById('api-key-section');
  if(info.needsKey){
    keySection.style.display='block';
    document.getElementById('api-key-input').placeholder=info.keyPlaceholder;
    document.getElementById('api-key-hint').textContent=info.keyHint;
  }else{
    keySection.style.display='none';
  }
}
function saveSettings(){
  localStorage.setItem('ai_provider',document.getElementById('provider-select').value);
  const k=document.getElementById('api-key-input').value.trim();
  if(k)localStorage.setItem('ai_key',k);
  closeSettings();
}

// ════════════════════════════════════════════════════════════════
//  STATE & DATA
// ════════════════════════════════════════════════════════════════
const S={view:'list',trips:[],cur:null,showForm:false};

async function loadData(){
  try{
    const {data}=await db.from('trips').select('*, invoices(*)').order('created_at',{ascending:false});
    S.trips=(data||[]).map(t=>({
      id:t.id,name:t.name,nombre:t.nombre||'',club:t.club||'',closed:t.closed,
      createdAt:new Date(t.created_at),
      invoices:(t.invoices||[]).map(i=>({
        id:i.id,status:i.status,imageData:i.image_data,
        fecha:i.fecha,concepto:i.concepto,precio:i.precio?parseFloat(i.precio):null
      }))
    }));
  }catch(e){console.error(e)}
  document.getElementById('loading').style.display='none';
  document.getElementById('login').style.display='flex';
  render();
}

// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function money(n){return(+n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}
function fdate(d){return new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}

function render(){
  if(sessionStorage.getItem('session')!=='1')return;
  document.getElementById('root').innerHTML=S.view==='list'?vList():vDetail();
}

function vList(){
  const form=S.showForm?`
    <div class="iform">
      <input class="fi" id="tn" type="text" placeholder="Nombre del viaje *" onkeydown="if(event.key==='Enter')confirmTrip()">
      <input class="fi" id="tnombre" type="text" placeholder="Empleado">
      <input class="fi" id="tclub" type="text" placeholder="Club / Hotel">
      <div style="display:flex;gap:8px">
        <button class="btn btn-p" onclick="confirmTrip()">Crear</button>
        <button class="btn" onclick="cancelForm()">Cancelar</button>
      </div>
    </div>`:'';
  
  let list='';
  if(!S.trips.length){
    list='<div class="empty"><p>No hay viajes. Crea el primero.</p></div>';
  }else{
    list='<div class="trips">'+S.trips.map(t=>{
      const done=t.invoices.filter(i=>i.status==='done');
      const total=done.reduce((s,i)=>s+(i.precio||0),0);
      return`<div class="tc" onclick="openTrip('${t.id}')">
        <div class="tn">${esc(t.name)}</div>
        <div class="tm">${t.nombre||''} · ${fdate(t.createdAt)} · ${done.length} fact. · ${money(total)}</div>
      </div>`;
    }).join('')+'</div>';
  }
  return'<div class="sh"><span class="st">Mis Viajes</span>'+(!S.showForm?'<button class="btn btn-p" onclick="showForm()">+ Nuevo</button>':'')+'</div>'+form+list;
}

function vDetail(){
  const trip=S.trips.find(t=>t.id===S.cur);
  if(!trip)return vList();
  const done=trip.invoices.filter(i=>i.status==='done');
  const total=done.reduce((s,i)=>s+(i.precio||0),0);
  
  const upZone=trip.closed?'':`
    <div class="uz" onclick="document.getElementById('fi').click()">
      <div style="font-size:30px;margin-bottom:10px">📎</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">Añadir facturas</div>
      <div style="font-size:13px;color:var(--t2)">La IA lee fecha, concepto e importe</div>
    </div>`;
  
  let table='';
  if(trip.invoices.length){
    const rows=trip.invoices.map(inv=>{
      if(inv.status==='loading')return'<tr><td colspan="4" style="color:var(--t2)">Analizando factura...</td></tr>';
      if(inv.status==='error')return'<tr><td colspan="4" style="color:var(--err)">Error al leer</td></tr>';
      return'<tr><td>'+esc(inv.fecha||'—')+'</td><td>'+esc(inv.concepto||'—')+'</td><td>'+money(inv.precio||0)+'</td><td><button class="btn" style="font-size:12px;padding:4px 8px;min-height:auto" onclick="delInvoice(''+inv.id+'')">✕</button></td></tr>';
    }).join('');
    table='<div class="tw"><table><thead><tr><th>Fecha</th><th>Concepto</th><th>€</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }else{
    table='<div class="empty" style="padding:2rem"><p>Sube la primera factura</p></div>';
  }
  
  return`
    <button class="back-btn" onclick="back()">← Todos los viajes</button>
    <div class="dt">${esc(trip.name)}</div>
    <div class="rcard">
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px">DATOS</div>
      <p><strong>Empleado:</strong> ${esc(trip.nombre||'—')}</p>
      <p><strong>Club:</strong> ${esc(trip.club||'Jandia Playa S.A.')}</p>
      <p><strong>Total:</strong> ${money(total)}</p>
    </div>
    ${upZone}${table}
    ${done.length?'<button class="btn btn-p" style="width:100%" onclick="alert('PDF en desarrollo')">📄 Generar PDF</button>':''}`;
}

// ════════════════════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════════════════════
function showForm(){S.showForm=true;render();setTimeout(()=>document.getElementById('tn')?.focus(),50)}
function cancelForm(){S.showForm=false;render()}
async function confirmTrip(){
  const v=document.getElementById('tn')?.value.trim();
  if(!v){document.getElementById('tn')?.focus();return}
  try{
    const{data}=await db.from('trips').insert({
      name:v,
      nombre:document.getElementById('tnombre')?.value.trim()||'',
      club:document.getElementById('tclub')?.value.trim()||''
    }).select().single();
    S.trips.unshift({
      id:data.id,name:data.name,nombre:data.nombre,club:data.club,closed:false,
      createdAt:new Date(data.created_at),invoices:[]
    });
    S.showForm=false;S.view='detail';S.cur=data.id;render();
  }catch(e){console.error(e);alert('Error al crear viaje')}
}
function openTrip(id){S.cur=id;S.view='detail';render()}
function back(){S.view='list';S.cur=null;render()}
async function delInvoice(id){
  if(!confirm('¿Eliminar factura?'))return;
  try{
    await db.from('invoices').delete().eq('id',id);
    const t=S.trips.find(t=>t.id===S.cur);
    if(t){t.invoices=t.invoices.filter(i=>i.id!==id);render()}
  }catch(e){console.error(e)}
}

function onFileSelect(input){
  const files=[...input.files].filter(f=>f.type.startsWith('image/'));
  files.forEach(processFile);
  input.value='';
}

async function processFile(file){
  const trip=S.trips.find(t=>t.id===S.cur);
  if(!trip||trip.closed)return;
  
  const provider=getProvider();
  const needsKey=PROVIDER_INFO[provider].needsKey;
  if(needsKey&&!getApiKey()){
    alert('⚠ Configura tu clave API en ⚙ Ajustes para usar '+PROVIDER_INFO[provider].name);
    return;
  }
  
  try{
    const{data:inv}=await db.from('invoices').insert({trip_id:trip.id,status:'loading'}).select().single();
    trip.invoices.push({id:inv.id,status:'loading',imageData:null,fecha:null,concepto:null,precio:null});
    render();
    
    const dataUrl=await toDataUrl(file);
    await db.from('invoices').update({image_data:dataUrl}).eq('id',inv.id);
    
    const res=await callAI(dataUrl,file.type);
    await db.from('invoices').update({status:'done',fecha:res.fecha,concepto:res.concepto,precio:res.precio}).eq('id',inv.id);
    
    const local=trip.invoices.find(i=>i.id===inv.id);
    if(local){
      local.status='done';local.imageData=dataUrl;
      local.fecha=res.fecha;local.concepto=res.concepto;local.precio=res.precio;
    }
    render();
  }catch(e){
    console.error(e);
    alert('Error: '+e.message);
  }
}

// ════════════════════════════════════════════════════════════════
//  AI FUNCTIONS
// ════════════════════════════════════════════════════════════════
async function toDataUrl(file){
  return new Promise((ok,fail)=>{
    const r=new FileReader();
    r.onerror=fail;
    r.onload=e=>{
      const img=new Image();
      img.onerror=fail;
      img.onload=()=>{
        const maxPx=1200;
        const sc=Math.min(1,maxPx/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc);
        c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        ok(c.toDataURL('image/jpeg',0.82));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function callAI(dataUrl,mimeType){
  const provider=getProvider();
  switch(provider){
    case 'tesseract':return await callTesseract(dataUrl);
    case 'anthropic':return await callAnthropic(dataUrl,mimeType);
    case 'google':return await callGoogle(dataUrl);
    case 'openai':return await callOpenAI(dataUrl);
  }
}

async function callTesseract(dataUrl){
  const worker=await Tesseract.createWorker('spa');
  const{data:{text}}=await worker.recognize(dataUrl);
  await worker.terminate();
  return parseText(text);
}

async function callAnthropic(dataUrl,mimeType){
  const key=getApiKey();
  const b64=dataUrl.split(',')[1];
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':key},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mimeType,data:b64}},
        {type:'text',text:'Analiza factura. JSON: {"fecha":"DD/MM/YYYY","concepto":"texto","precio":0.00}'}
      ]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  return JSON.parse((d.content?.find(c=>c.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
}

async function callGoogle(dataUrl){
  const key=getApiKey();
  const b64=dataUrl.split(',')[1];
  const resp=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${key}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'TEXT_DETECTION'}]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  const text=d.responses?.[0]?.fullTextAnnotation?.text||'';
  return parseText(text);
}

async function callOpenAI(dataUrl){
  const key=getApiKey();
  const resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4o-mini',max_tokens:500,
      messages:[{role:'user',content:[
        {type:'image_url',image_url:{url:dataUrl}},
        {type:'text',text:'Analiza factura. JSON: {"fecha":"DD/MM/YYYY","concepto":"texto","precio":0.00}'}
      ]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  return JSON.parse((d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim());
}

function parseText(text){
  const fecha=text.match(/(\d{1,2})[/\-\.](\d{1,2})[/\-\.](\d{2,4})/);
  const precio=text.match(/(\d+[.,]\d{2})\s*€?/)||text.match(/€\s*(\d+[.,]\d{2})/);
  const lines=text.split('\n').filter(l=>l.trim().length>3);
  const concepto=lines.slice(0,3).join(' ').substring(0,80);
  return{
    fecha:fecha?`${fecha[1].padStart(2,'0')}/${fecha[2].padStart(2,'0')}/${fecha[3]}`:null,
    concepto:concepto||null,
    precio:precio?parseFloat(precio[1].replace(',','.')):null
  };
}

if(sessionStorage.getItem('session')==='1'){
  document.getElementById('loading').style.display='none';
  document.getElementById('login').style.display='none';
  document.getElementById('app-shell').classList.add('visible');
  loadData();
}else{
  loadData();
}
