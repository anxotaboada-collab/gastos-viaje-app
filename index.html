<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Liquidación Gastos · Jandia Playa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#f9f8f6;color:#1a1917}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#1a1917}
.login-box{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px}
.login-title{font-size:22px;font-weight:700;margin-bottom:1rem}
.login-field{margin-bottom:1rem}
.login-input{width:100%;font-size:16px;padding:14px 16px;border-radius:8px;border:1.5px solid #e5e3df;background:#f9f8f6;outline:none}
.login-btn{width:100%;font-size:16px;font-weight:600;padding:15px;border-radius:8px;border:none;background:#1a1917;color:#fff;cursor:pointer}
.login-err{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:1rem;display:none}
.login-err.show{display:block}
.app-shell{display:none;flex-direction:column;min-height:100vh}
.app-shell.visible{display:flex}
.app-header{background:#1a1917;color:#fff;padding:0 1rem;display:flex;align-items:center;height:56px}
.header-btns{display:flex;gap:6px;margin-left:auto}
.hbtn{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:13px;padding:7px 12px;border-radius:6px;cursor:pointer}
.app-body{flex:1;padding:1.25rem 1rem;max-width:700px;margin:0 auto;width:100%}
.btn{font-size:14px;font-weight:500;padding:10px 18px;border-radius:8px;border:1.5px solid #e5e3df;background:#fff;color:#1a1917;cursor:pointer}
.btn-p{background:#1a1917;color:#fff;border-color:#1a1917}
.trips{display:grid;gap:10px;margin-top:1rem}
.tc{background:#fff;border:1.5px solid #e5e3df;border-radius:12px;padding:1rem;cursor:pointer}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.drawer-backdrop.open{display:flex}
.drawer{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:500px;margin:0 auto}
.drawer-input{width:100%;font-size:16px;padding:13px 14px;border-radius:8px;border:1.5px solid #e5e3df;background:#f9f8f6;outline:none;margin-bottom:1rem}
.provider-info{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:1rem;font-size:13px}
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <h1 class="login-title">Gastos de Viaje</h1>
    <p>Jandia Playa S.A.</p>
    <div class="login-err" id="login-err">Usuario o contraseña incorrectos</div>
    <div class="login-field">
      <input class="login-input" id="l-user" type="text" placeholder="Usuario">
    </div>
    <div class="login-field">
      <input class="login-input" id="l-pass" type="password" placeholder="Contraseña">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div class="app-shell" id="app-shell">
  <header class="app-header">
    <span>Gastos de Viaje</span>
    <div class="header-btns">
      <button class="hbtn" onclick="openSettings()">⚙</button>
      <button class="hbtn" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <div class="app-body">
    <div id="root"></div>
  </div>
</div>

<div class="drawer-backdrop" id="settings-backdrop" onclick="closeSettings()">
  <div class="drawer" onclick="event.stopPropagation()">
    <h2>Ajustes de IA</h2>
    <select class="drawer-input" id="provider-select" onchange="updateProviderUI()">
      <option value="tesseract">Tesseract.js (100% gratis)</option>
      <option value="anthropic">Anthropic Claude</option>
      <option value="google">Google Cloud Vision</option>
      <option value="openai">OpenAI GPT-4o-mini</option>
    </select>
    <div id="provider-info"></div>
    <div id="api-key-section" style="display:none">
      <input class="drawer-input" id="api-key-input" type="password" placeholder="API Key">
      <p id="api-key-hint" style="font-size:12px;color:#6b6861"></p>
    </div>
    <button class="btn btn-p" style="width:100%" onclick="saveSettings()">Guardar</button>
  </div>
</div>

<script>
// SUPABASE
const SUPABASE_URL='https://gphyysdzkjnwihaottop.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwaHl5c2R6a2lud2loYW90dG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTA4MDgsImV4cCI6MjA5MjE4NjgwOH0.9rZFAIHAhfIKPpeQwcm1jTpuJlXwaQ9uK9VFxkZ6f9Q';
let supabase;
try{supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}catch(e){console.error(e)}

// AUTH
const CREDENTIALS={anxo:'11223344'};
function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  if(CREDENTIALS[u]===p){
    sessionStorage.setItem('session','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-shell').classList.add('visible');
    loadData();
  }else{
    document.getElementById('login-err').classList.add('show');
  }
}
function doLogout(){
  sessionStorage.removeItem('session');
  location.reload();
}

// SETTINGS
function getProvider(){return localStorage.getItem('ai_provider')||'tesseract'}
function getApiKey(){return localStorage.getItem('ai_key')||''}
const PROVIDER_INFO={
  tesseract:{name:'Tesseract.js',info:'✅ 100% gratis, corre en tu navegador',needsKey:false},
  anthropic:{name:'Anthropic Claude',info:'✅ Muy preciso. $5 gratis',needsKey:true,keyPlaceholder:'sk-ant-api03-...',keyHint:'console.anthropic.com → API Keys'},
  google:{name:'Google Cloud Vision',info:'✅ 1000/mes gratis',needsKey:true,keyPlaceholder:'AIzaSy...',keyHint:'console.cloud.google.com → Credentials'},
  openai:{name:'OpenAI',info:'✅ Barato. $5 gratis',needsKey:true,keyPlaceholder:'sk-proj-...',keyHint:'platform.openai.com → API Keys'}
};

function openSettings(){
  document.getElementById('provider-select').value=getProvider();
  document.getElementById('api-key-input').value=getApiKey();
  updateProviderUI();
  document.getElementById('settings-backdrop').classList.add('open');
}
function closeSettings(){document.getElementById('settings-backdrop').classList.remove('open')}

function updateProviderUI(){
  const provider=document.getElementById('provider-select').value;
  const info=PROVIDER_INFO[provider];
  document.getElementById('provider-info').innerHTML='<div class="provider-info">'+info.info+'</div>';
  const keySection=document.getElementById('api-key-section');
  if(info.needsKey){
    keySection.style.display='block';
    document.getElementById('api-key-input').placeholder=info.keyPlaceholder;
    document.getElementById('api-key-hint').innerHTML=info.keyHint;
  }else{
    keySection.style.display='none';
  }
}

function saveSettings(){
  localStorage.setItem('ai_provider',document.getElementById('provider-select').value);
  const k=document.getElementById('api-key-input').value.trim();
  if(k)localStorage.setItem('ai_key',k);
  closeSettings();
}

// STATE
const S={trips:[],view:'list'};

async function loadData(){
  try{
    const {data}=await supabase.from('trips').select('*').order('created_at',{ascending:false});
    S.trips=data||[];
    render();
  }catch(e){
    console.error(e);
  }
}

function render(){
  document.getElementById('root').innerHTML=
    '<h2>Mis Viajes</h2>'+
    '<button class="btn btn-p" onclick="alert(\'Demo básica\')">+ Nuevo</button>'+
    (S.trips.length?'<div class="trips">'+S.trips.map(t=>'<div class="tc">'+t.name+'</div>').join('')+'</div>':'<p>No hay viajes</p>');
}

// AI FUNCTIONS
async function callTesseract(dataUrl){
  const worker=await Tesseract.createWorker('spa');
  const {data:{text}}=await worker.recognize(dataUrl);
  await worker.terminate();
  return parseText(text);
}

async function callAnthropic(dataUrl,mimeType){
  const key=getApiKey();
  const b64=dataUrl.split(',')[1];
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':key},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:500,
      messages:[{
        role:'user',
        content:[
          {type:'image',source:{type:'base64',media_type:mimeType,data:b64}},
          {type:'text',text:'Analiza factura. JSON: {"fecha":"DD/MM/YYYY","concepto":"texto","precio":0.00}'}
        ]
      }]
    })
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  return JSON.parse((d.content?.find(c=>c.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
}

async function callGoogle(dataUrl){
  const key=getApiKey();
  const b64=dataUrl.split(',')[1];
  const resp=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${key}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'TEXT_DETECTION'}]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  const text=d.responses?.[0]?.fullTextAnnotation?.text||'';
  return parseText(text);
}

async function callOpenAI(dataUrl){
  const key=getApiKey();
  const resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({
      model:'gpt-4o-mini',
      max_tokens:500,
      messages:[{
        role:'user',
        content:[
          {type:'image_url',image_url:{url:dataUrl}},
          {type:'text',text:'Analiza factura. JSON: {"fecha":"DD/MM/YYYY","concepto":"texto","precio":0.00}'}
        ]
      }]
    })
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  return JSON.parse((d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim());
}

function parseText(text){
  const fecha=text.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  const precio=text.match(/(\d+[.,]\d{2})\s*€?/)||text.match(/€\s*(\d+[.,]\d{2})/);
  const lines=text.split('\n').filter(l=>l.trim().length>3);
  const concepto=lines.slice(0,3).join(' ').substring(0,80);
  return{
    fecha:fecha?`${fecha[1].padStart(2,'0')}/${fecha[2].padStart(2,'0')}/${fecha[3]}`:null,
    concepto:concepto||null,
    precio:precio?parseFloat(precio[1].replace(',','.')):null
  };
}

// INIT
if(sessionStorage.getItem('session')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').classList.add('visible');
  loadData();
}
</script>
</body>
</html>
