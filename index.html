<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidación Gastos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1917}
.loading{position:fixed;inset:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;z-index:999}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1917}
.box{background:#fff;border-radius:16px;padding:2rem;width:90%;max-width:380px}
h1{font-size:24px;margin-bottom:1rem}
input{width:100%;padding:14px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:1rem;font-size:16px;outline:none}
input:focus{border-color:#2563eb}
button{width:100%;padding:14px;background:#1a1917;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
button:active{opacity:0.8}
.err{background:#fee;color:#c00;padding:10px;border-radius:8px;margin-bottom:1rem;display:none}
.err.show{display:block}
.app{display:none;min-height:100vh;flex-direction:column}
.app.visible{display:flex}
.header{background:#1a1917;color:#fff;padding:1rem;display:flex;justify-content:space-between;align-items:center}
.hbtn{background:rgba(255,255,255,.12);color:#fff;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;width:auto;font-size:14px}
.body{padding:1.5rem;max-width:700px;margin:0 auto;width:100%}
.btn{background:#fff;color:#1a1917;padding:10px 18px;border-radius:8px;border:1.5px solid #ddd;cursor:pointer;width:auto;font-size:14px}
.btn-p{background:#1a1917;color:#fff;border-color:#1a1917}
.trips{display:grid;gap:10px;margin-top:1rem}
.trip{background:#fff;border:1px solid #ddd;border-radius:8px;padding:1rem;cursor:pointer}
.trip:hover{background:#f9f9f9}
.form{background:#fff;border:1px solid#ddd;border-radius:8px;padding:1rem;margin-bottom:1rem}
.form input{margin-bottom:10px}
.form button{margin-top:10px}
.back{background:none;border:none;color:#666;font-size:14px;cursor:pointer;padding:0;margin-bottom:1rem;text-align:left;width:auto}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:1rem;margin-bottom:1rem}
.uz{border:2px dashed #ddd;border-radius:8px;padding:2rem 1.25rem;text-align:center;cursor:pointer;margin-bottom:1rem;background:#fafafa}
.uz:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
th{background:#f5f5f5;font-size:12px;font-weight:600;text-transform:uppercase;color:#666;text-align:left;padding:10px;border-bottom:2px solid #ddd}
td{padding:10px;border-bottom:1px solid #eee;font-size:14px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;z-index:100}
.modal.open{display:flex}
.drawer{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-width:500px;margin:0 auto}
select{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:1rem;font-size:16px}
.info{background:#e3f2fd;padding:12px;border-radius:8px;margin-bottom:1rem;font-size:14px}
.empty{text-align:center;padding:4rem 1rem;color:#999}
</style>
</head>
<body>

<div class="loading" id="loading">
  <p>Cargando...</p>
</div>

<div class="login" id="login" style="display:none">
  <div class="box">
    <h1>Gastos de Viaje</h1>
    <p style="color:#666;margin-bottom:1.5rem">Jandia Playa S.A.</p>
    <div class="err" id="err">Usuario o contraseña incorrectos</div>
    <input id="user" type="text" placeholder="Usuario" value="anxo">
    <input id="pass" type="password" placeholder="Contraseña" value="11223344">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <span>Gastos de Viaje</span>
    <div style="display:flex;gap:6px">
      <button class="hbtn" onclick="openSettings()">⚙️</button>
      <button class="hbtn" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="body">
    <div id="root"></div>
  </div>
</div>

<div class="modal" id="settings" onclick="closeSettings()">
  <div class="drawer" onclick="event.stopPropagation()">
    <h2 style="margin-bottom:1rem">Ajustes de IA</h2>
    <select id="provider" onchange="updateProvider()">
      <option value="tesseract">Tesseract.js (100% gratis)</option>
      <option value="anthropic">Anthropic Claude</option>
      <option value="google">Google Cloud Vision</option>
      <option value="openai">OpenAI GPT-4o-mini</option>
    </select>
    <div id="provider-info"></div>
    <div id="key-section" style="display:none">
      <input id="api-key" type="password" placeholder="API Key" style="margin-bottom:0.5rem">
      <p id="key-hint" style="font-size:12px;color:#666;margin-bottom:1rem"></p>
    </div>
    <button onclick="saveSettings()">Guardar</button>
  </div>
</div>

<input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="onFile(this)">

<script>
const URL='https://gphyysdzkjnwihaottop.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwaHl5c2R6a2lud2loYW90dG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTA4MDgsImV4cCI6MjA5MjE4NjgwOH0.9rZFAIHAhfIKPpeQwcm1jTpuJlXwaQ9uK9VFxkZ6f9Q';
const CREDS={anxo:'11223344'};
const PROVIDERS={
  tesseract:{name:'Tesseract',info:'✅ 100% gratis, local',needsKey:false},
  anthropic:{name:'Anthropic',info:'✅ Muy preciso, $5 gratis',needsKey:true,ph:'sk-ant-...',hint:'console.anthropic.com'},
  google:{name:'Google Vision',info:'✅ 1000/mes gratis',needsKey:true,ph:'AIzaSy...',hint:'console.cloud.google.com'},
  openai:{name:'OpenAI',info:'✅ Barato, $5 gratis',needsKey:true,ph:'sk-proj-...',hint:'platform.openai.com'}
};

let db;
try{db=window.supabase.createClient(URL,KEY)}catch(e){console.error(e)}

const S={view:'list',trips:[],cur:null,form:false};

function login(){
  const u=document.getElementById('user').value.trim().toLowerCase();
  const p=document.getElementById('pass').value;
  if(CREDS[u]===p){
    sessionStorage.setItem('s','1');
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('visible');
    loadData();
  }else{
    document.getElementById('err').classList.add('show');
  }
}

function logout(){sessionStorage.clear();location.reload()}

function openSettings(){
  document.getElementById('provider').value=localStorage.getItem('provider')||'tesseract';
  document.getElementById('api-key').value=localStorage.getItem('key')||'';
  updateProvider();
  document.getElementById('settings').classList.add('open');
}

function closeSettings(){document.getElementById('settings').classList.remove('open')}

function updateProvider(){
  const p=document.getElementById('provider').value;
  const info=PROVIDERS[p];
  document.getElementById('provider-info').innerHTML='<div class="info">'+info.info+'</div>';
  const ks=document.getElementById('key-section');
  if(info.needsKey){
    ks.style.display='block';
    document.getElementById('api-key').placeholder=info.ph;
    document.getElementById('key-hint').textContent=info.hint;
  }else{
    ks.style.display='none';
  }
}

function saveSettings(){
  localStorage.setItem('provider',document.getElementById('provider').value);
  const k=document.getElementById('api-key').value.trim();
  if(k)localStorage.setItem('key',k);
  closeSettings();
}

async function loadData(){
  try{
    const {data}=await db.from('trips').select('*, invoices(*)').order('created_at',{ascending:false});
    S.trips=(data||[]).map(t=>({
      id:t.id,name:t.name,nombre:t.nombre||'',club:t.club||'',closed:t.closed,
      created:new Date(t.created_at),
      invoices:(t.invoices||[]).map(i=>({
        id:i.id,status:i.status,img:i.image_data,
        fecha:i.fecha,concepto:i.concepto,precio:i.precio?parseFloat(i.precio):null
      }))
    }));
  }catch(e){console.error(e)}
  document.getElementById('loading').style.display='none';
  document.getElementById('login').style.display='flex';
  render();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function money(n){return(+n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}

function render(){
  if(!sessionStorage.getItem('s'))return;
  document.getElementById('root').innerHTML=S.view==='list'?vList():vDetail();
}

function vList(){
  const form=S.form?`<div class="form">
    <input id="tn" type="text" placeholder="Nombre del viaje *">
    <input id="tnombre" type="text" placeholder="Empleado">
    <input id="tclub" type="text" placeholder="Club">
    <div style="display:flex;gap:8px">
      <button class="btn btn-p" onclick="create()">Crear</button>
      <button class="btn" onclick="S.form=false;render()">Cancelar</button>
    </div>
  </div>`:'';
  
  let list='';
  if(!S.trips.length){
    list='<div class="empty"><p>No hay viajes</p></div>';
  }else{
    list='<div class="trips">'+S.trips.map(t=>{
      const done=t.invoices.filter(i=>i.status==='done');
      const total=done.reduce((s,i)=>s+(i.precio||0),0);
      const fecha=t.created.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
      return'<div class="trip" onclick="open1(\''+t.id+'\')"><div style="font-size:16px;font-weight:600;margin-bottom:4px">'+esc(t.name)+'</div><div style="font-size:13px;color:#666">'+esc(t.nombre||'')+' · '+fecha+' · '+done.length+' fact. · '+money(total)+'</div></div>';
    }).join('')+'</div>';
  }
  return'<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h2>Mis Viajes</h2>'+(!S.form?'<button class="btn btn-p" onclick="S.form=true;render()">+ Nuevo</button>':'')+'</div>'+form+list;
}

function vDetail(){
  const t=S.trips.find(x=>x.id===S.cur);
  if(!t)return vList();
  const done=t.invoices.filter(i=>i.status==='done');
  const total=done.reduce((s,i)=>s+(i.precio||0),0);
  
  const uz=t.closed?'':`<div class="uz" onclick="document.getElementById('fi').click()"><div style="font-size:30px;margin-bottom:10px">📎</div><div style="font-size:15px;font-weight:600;margin-bottom:4px">Añadir facturas</div><div style="font-size:13px;color:#666">La IA lee fecha, concepto e importe</div></div>`;
  
  let table='';
  if(t.invoices.length){
    const rows=t.invoices.map(inv=>{
      if(inv.status==='loading')return'<tr><td colspan="4">Analizando...</td></tr>';
      if(inv.status==='error')return'<tr><td colspan="4" style="color:#c00">Error</td></tr>';
      return'<tr><td>'+esc(inv.fecha||'—')+'</td><td>'+esc(inv.concepto||'—')+'</td><td>'+money(inv.precio||0)+'</td><td><button class="btn" style="font-size:12px;padding:4px 8px" onclick="del(event,\''+inv.id+'\')">✕</button></td></tr>';
    }).join('');
    table='<table><thead><tr><th>Fecha</th><th>Concepto</th><th>€</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  }else{
    table='<div class="empty"><p>Sube la primera factura</p></div>';
  }
  
  return'<button class="back" onclick="S.view=\'list\';S.cur=null;render()">← Todos</button><h2 style="margin-bottom:1rem">'+esc(t.name)+'</h2><div class="card"><p><strong>Empleado:</strong> '+esc(t.nombre||'—')+'</p><p><strong>Club:</strong> '+esc(t.club||'Jandia Playa')+'</p><p><strong>Total:</strong> '+money(total)+'</p></div>'+uz+table;
}

function open1(id){S.cur=id;S.view='detail';render()}

async function create(){
  const v=document.getElementById('tn').value.trim();
  if(!v)return;
  try{
    const{data}=await db.from('trips').insert({
      name:v,
      nombre:document.getElementById('tnombre').value.trim()||'',
      club:document.getElementById('tclub').value.trim()||''
    }).select().single();
    S.trips.unshift({id:data.id,name:data.name,nombre:data.nombre,club:data.club,closed:false,created:new Date(data.created_at),invoices:[]});
    S.form=false;S.view='detail';S.cur=data.id;render();
  }catch(e){console.error(e);alert('Error')}
}

function del(e,id){
  e.stopPropagation();
  if(!confirm('¿Eliminar?'))return;
  db.from('invoices').delete().eq('id',id).then(()=>{
    const t=S.trips.find(x=>x.id===S.cur);
    if(t){t.invoices=t.invoices.filter(i=>i.id!==id);render()}
  });
}

function onFile(input){
  const files=[...input.files].filter(f=>f.type.startsWith('image/'));
  files.forEach(processFile);
  input.value='';
}

async function processFile(file){
  const t=S.trips.find(x=>x.id===S.cur);
  if(!t||t.closed)return;
  
  const provider=localStorage.getItem('provider')||'tesseract';
  const needsKey=PROVIDERS[provider].needsKey;
  if(needsKey&&!localStorage.getItem('key')){
    alert('⚠ Configura API key en ⚙ Ajustes');
    return;
  }
  
  try{
    const{data:inv}=await db.from('invoices').insert({trip_id:t.id,status:'loading'}).select().single();
    t.invoices.push({id:inv.id,status:'loading',img:null,fecha:null,concepto:null,precio:null});
    render();
    
    const dataUrl=await toDataUrl(file);
    await db.from('invoices').update({image_data:dataUrl}).eq('id',inv.id);
    
    const res=await callAI(dataUrl,file.type);
    await db.from('invoices').update({status:'done',fecha:res.fecha,concepto:res.concepto,precio:res.precio}).eq('id',inv.id);
    
    const local=t.invoices.find(i=>i.id===inv.id);
    if(local){local.status='done';local.img=dataUrl;local.fecha=res.fecha;local.concepto=res.concepto;local.precio=res.precio}
    render();
  }catch(e){console.error(e);alert('Error: '+e.message)}
}

async function toDataUrl(file){
  return new Promise((ok,fail)=>{
    const r=new FileReader();
    r.onerror=fail;
    r.onload=e=>{
      const img=new Image();
      img.onerror=fail;
      img.onload=()=>{
        const sc=Math.min(1,1200/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc);
        c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        ok(c.toDataURL('image/jpeg',0.82));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function callAI(dataUrl,mimeType){
  const provider=localStorage.getItem('provider')||'tesseract';
  if(provider==='tesseract')return await callTesseract(dataUrl);
  if(provider==='anthropic')return await callAnthropic(dataUrl,mimeType);
  if(provider==='google')return await callGoogle(dataUrl);
  if(provider==='openai')return await callOpenAI(dataUrl);
}

async function callTesseract(dataUrl){
  const worker=await Tesseract.createWorker('spa');
  const{data:{text}}=await worker.recognize(dataUrl);
  await worker.terminate();
  return parseText(text);
}

async function callAnthropic(dataUrl,mimeType){
  const key=localStorage.getItem('key');
  const b64=dataUrl.split(',')[1];
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':key},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mimeType,data:b64}},
        {type:'text',text:'Analiza factura. JSON: {"fecha":"DD/MM/YYYY","concepto":"texto","precio":0.00}'}
      ]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  return JSON.parse((d.content?.find(c=>c.type==='text')?.text||'{}').replace(/```json|```/g,'').trim());
}

async function callGoogle(dataUrl){
  const key=localStorage.getItem('key');
  const b64=dataUrl.split(',')[1];
  const resp=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${key}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'TEXT_DETECTION'}]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  const text=d.responses?.[0]?.fullTextAnnotation?.text||'';
  return parseText(text);
}

async function callOpenAI(dataUrl){
  const key=localStorage.getItem('key');
  const resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4o-mini',max_tokens:500,
      messages:[{role:'user',content:[
        {type:'image_url',image_url:{url:dataUrl}},
        {type:'text',text:'Analiza factura. JSON: {"fecha":"DD/MM/YYYY","concepto":"texto","precio":0.00}'}
      ]}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const d=await resp.json();
  return JSON.parse((d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim());
}

function parseText(text){
  const fecha=text.match(/(\d{1,2})[\/-\.](\d{1,2})[\/-\.](\d{2,4})/);
  const precio=text.match(/(\d+[.,]\d{2})\s*€?/)||text.match(/€\s*(\d+[.,]\d{2})/);
  const lines=text.split('\n').filter(l=>l.trim().length>3);
  const concepto=lines.slice(0,3).join(' ').substring(0,80);
  return{
    fecha:fecha?`${fecha[1].padStart(2,'0')}/${fecha[2].padStart(2,'0')}/${fecha[3]}`:null,
    concepto:concepto||null,
    precio:precio?parseFloat(precio[1].replace(',','.')):null
  };
}

if(sessionStorage.getItem('s')==='1'){
  document.getElementById('loading').style.display='none';
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('visible');
  loadData();
}else{
  loadData();
}
</script>
</body>
</html>
